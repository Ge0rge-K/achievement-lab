name: Docs Index Check

on:
  push:
    branches: [ "main" ]
  pull_request:

jobs:
  docs-index:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - name: Verify docs index
        run: python scripts/verify-docs-index.py
